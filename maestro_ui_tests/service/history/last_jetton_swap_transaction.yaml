appId: com.ton_keeper.debug
---
- runScript:
    file: ../../scripts/api/v2/accounts/getLastSwapEvent.js
    env:
      addr: ${output.walletAddress}
      auth_token: ${auth}

- assertTrue: ${output.jettonLastSwap.status == "ok"}
- assertTrue: ${String(output.jettonLastSwapJettonSwap.ton_in) == nanoTonToSwap}

- evalScript: ${output.jettonLastSwapUsdtGot = output.formatter.formatJetton(output.jettonLastSwapJettonSwap.amount_out, output.jettonLastSwapJettonSwap.jetton_master_out.decimals, 4)}
- assertVisible: + ${output.jettonLastSwapUsdtGot} USD₮

- runScript: ../../scripts/utils/check_history_time.js
